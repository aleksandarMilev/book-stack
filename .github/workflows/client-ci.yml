name: Client CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: client-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect client changes
    runs-on: ubuntu-latest
    outputs:
      client_changed: ${{ steps.filter.outputs.client_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi

          if [[ -z "$BASE_SHA" || "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            BASE_SHA="$(git rev-parse HEAD~1)"
          fi

          git diff --name-only "$BASE_SHA" "${{ github.sha }}" > changed_files.txt || true

          if grep -E '^(client/|\.github/workflows/client-ci\.yml)' changed_files.txt >/dev/null; then
            echo "client_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "client_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Show changed files
        run: cat changed_files.txt || true

  client-ci:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client_changed == 'true'
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          if-no-files-found: error

  client-noop:
    name: No client changes
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.client_changed != 'true'
    steps:
      - name: Skip
        run: echo "No client changes detected."
